openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: iNi - Invent N Invest Finance Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: portfolio
    description: Portfolio management
  - name: analytics
    description: Reporting and analytics
  - name: deals
    description: M&A deals and pipeline
  - name: services
    description: Professional services engagements
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /portfolio/summary:
    get:
      operationId: getPortfolioSummary
      tags: [portfolio]
      summary: Get portfolio summary metrics
      responses:
        "200":
          description: Portfolio summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioSummary"

  /portfolio/companies:
    get:
      operationId: getPortfolioCompanies
      tags: [portfolio]
      summary: List portfolio companies
      responses:
        "200":
          description: List of portfolio companies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PortfolioCompany"

  /portfolio/companies/{id}:
    get:
      operationId: getPortfolioCompany
      tags: [portfolio]
      summary: Get a portfolio company detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Company detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioCompanyDetail"

  /portfolio/kpis:
    get:
      operationId: getPortfolioKpis
      tags: [portfolio]
      summary: Get KPI dashboard data
      parameters:
        - name: companyId
          in: query
          schema:
            type: string
        - name: period
          in: query
          schema:
            type: string
            enum: [Q1, Q2, Q3, Q4, TTM, YTD]
      responses:
        "200":
          description: KPI data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KpiData"

  /analytics/revenue:
    get:
      operationId: getRevenueAnalytics
      tags: [analytics]
      summary: Get revenue trend data
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [6m, 1y, 2y, 3y]
        - name: companyId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Revenue analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevenueAnalytics"

  /analytics/benchmarks:
    get:
      operationId: getBenchmarks
      tags: [analytics]
      summary: Get industry benchmarks
      parameters:
        - name: industry
          in: query
          schema:
            type: string
        - name: metric
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Benchmark data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BenchmarkData"

  /analytics/reports:
    get:
      operationId: getReports
      tags: [analytics]
      summary: List available reports
      responses:
        "200":
          description: List of reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Report"

  /deals:
    get:
      operationId: getDeals
      tags: [deals]
      summary: List M&A deals
      parameters:
        - name: stage
          in: query
          schema:
            type: string
            enum: [sourcing, nda, due_diligence, negotiation, closing, closed, passed]
        - name: type
          in: query
          schema:
            type: string
            enum: [acquisition, merger, investment, divestiture]
      responses:
        "200":
          description: List of deals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Deal"

  /deals/{id}:
    get:
      operationId: getDeal
      tags: [deals]
      summary: Get deal details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deal detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DealDetail"

  /deals/pipeline-summary:
    get:
      operationId: getDealPipelineSummary
      tags: [deals]
      summary: Get M&A pipeline summary
      responses:
        "200":
          description: Pipeline summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineSummary"

  /services/engagements:
    get:
      operationId: getEngagements
      tags: [services]
      summary: List professional service engagements
      responses:
        "200":
          description: List of engagements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Engagement"

  /services/overview:
    get:
      operationId: getServicesOverview
      tags: [services]
      summary: Get professional services overview metrics
      responses:
        "200":
          description: Services overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServicesOverview"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    PortfolioSummary:
      type: object
      properties:
        totalCompanies:
          type: integer
        totalAum:
          type: number
        totalRevenue:
          type: number
        avgGrowthRate:
          type: number
        avgValuation:
          type: number
        totalDeals:
          type: integer
        aumChange:
          type: number
        revenueChange:
          type: number
        growthChange:
          type: number
      required: [totalCompanies, totalAum, totalRevenue, avgGrowthRate, avgValuation, totalDeals, aumChange, revenueChange, growthChange]

    PortfolioCompany:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        industry:
          type: string
        stage:
          type: string
          enum: [seed, series_a, series_b, series_c, growth, public]
        revenue:
          type: number
        valuation:
          type: number
        growthRate:
          type: number
        employees:
          type: integer
        location:
          type: string
        status:
          type: string
          enum: [active, monitoring, exited, watchlist]
        dataVerified:
          type: boolean
        ndaSigned:
          type: boolean
        lastUpdated:
          type: string
        logo:
          type: string
      required: [id, name, industry, stage, revenue, valuation, growthRate, employees, location, status, dataVerified, ndaSigned, lastUpdated]

    PortfolioCompanyDetail:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        industry:
          type: string
        stage:
          type: string
        revenue:
          type: number
        valuation:
          type: number
        growthRate:
          type: number
        employees:
          type: integer
        location:
          type: string
        status:
          type: string
        dataVerified:
          type: boolean
        ndaSigned:
          type: boolean
        lastUpdated:
          type: string
        capTable:
          type: array
          items:
            $ref: "#/components/schemas/CapTableEntry"
        financials:
          $ref: "#/components/schemas/CompanyFinancials"
        kpis:
          type: array
          items:
            $ref: "#/components/schemas/KpiMetric"
      required: [id, name, industry, stage, revenue, valuation, growthRate, employees, location, status, dataVerified, ndaSigned, lastUpdated, capTable, financials, kpis]

    CapTableEntry:
      type: object
      properties:
        investor:
          type: string
        shares:
          type: integer
        percentage:
          type: number
        shareClass:
          type: string
        investmentAmount:
          type: number
      required: [investor, shares, percentage, shareClass, investmentAmount]

    CompanyFinancials:
      type: object
      properties:
        revenue:
          type: number
        expenses:
          type: number
        ebitda:
          type: number
        cashOnHand:
          type: number
        burnRate:
          type: number
        runway:
          type: integer
      required: [revenue, expenses, ebitda, cashOnHand, burnRate, runway]

    KpiMetric:
      type: object
      properties:
        name:
          type: string
        value:
          type: number
        unit:
          type: string
        change:
          type: number
        trend:
          type: string
          enum: [up, down, flat]
      required: [name, value, unit, change, trend]

    KpiData:
      type: object
      properties:
        metrics:
          type: array
          items:
            $ref: "#/components/schemas/KpiMetric"
        period:
          type: string
        companyName:
          type: string
      required: [metrics, period, companyName]

    RevenueDataPoint:
      type: object
      properties:
        period:
          type: string
        revenue:
          type: number
        expenses:
          type: number
        ebitda:
          type: number
        arr:
          type: number
      required: [period, revenue, expenses, ebitda, arr]

    RevenueAnalytics:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/RevenueDataPoint"
        totalRevenue:
          type: number
        revenueGrowth:
          type: number
        arrGrowth:
          type: number
      required: [data, totalRevenue, revenueGrowth, arrGrowth]

    BenchmarkItem:
      type: object
      properties:
        label:
          type: string
        company:
          type: number
        industry:
          type: number
        topQuartile:
          type: number
        unit:
          type: string
      required: [label, company, industry, topQuartile, unit]

    BenchmarkData:
      type: object
      properties:
        industry:
          type: string
        metrics:
          type: array
          items:
            $ref: "#/components/schemas/BenchmarkItem"
      required: [industry, metrics]

    Report:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        type:
          type: string
          enum: [investor_update, financial_summary, kpi_report, board_deck, due_diligence, benchmarking]
        status:
          type: string
          enum: [draft, ready, published, archived]
        createdAt:
          type: string
        updatedAt:
          type: string
        sharedWith:
          type: integer
        companyName:
          type: string
      required: [id, title, type, status, createdAt, updatedAt, sharedWith, companyName]

    Deal:
      type: object
      properties:
        id:
          type: string
        companyName:
          type: string
        industry:
          type: string
        dealType:
          type: string
          enum: [acquisition, merger, investment, divestiture]
        stage:
          type: string
          enum: [sourcing, nda, due_diligence, negotiation, closing, closed, passed]
        dealSize:
          type: number
        valuation:
          type: number
        targetRevenue:
          type: number
        assignedTo:
          type: string
        priority:
          type: string
          enum: [high, medium, low]
        createdAt:
          type: string
        updatedAt:
          type: string
        closingDate:
          type: string
        ndaSigned:
          type: boolean
        dataRoomAccess:
          type: boolean
      required: [id, companyName, industry, dealType, stage, dealSize, valuation, targetRevenue, assignedTo, priority, createdAt, updatedAt, ndaSigned, dataRoomAccess]

    DealDetail:
      type: object
      properties:
        id:
          type: string
        companyName:
          type: string
        industry:
          type: string
        dealType:
          type: string
        stage:
          type: string
        dealSize:
          type: number
        valuation:
          type: number
        targetRevenue:
          type: number
        assignedTo:
          type: string
        priority:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
        closingDate:
          type: string
        ndaSigned:
          type: boolean
        dataRoomAccess:
          type: boolean
        dueDiligenceItems:
          type: array
          items:
            $ref: "#/components/schemas/DueDiligenceItem"
        timeline:
          type: array
          items:
            $ref: "#/components/schemas/TimelineEvent"
      required: [id, companyName, industry, dealType, stage, dealSize, valuation, targetRevenue, assignedTo, priority, createdAt, updatedAt, ndaSigned, dataRoomAccess, dueDiligenceItems, timeline]

    DueDiligenceItem:
      type: object
      properties:
        category:
          type: string
        item:
          type: string
        status:
          type: string
          enum: [pending, in_progress, completed, flagged]
        assignedTo:
          type: string
        dueDate:
          type: string
      required: [category, item, status, assignedTo, dueDate]

    TimelineEvent:
      type: object
      properties:
        date:
          type: string
        event:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [milestone, document, meeting, update]
      required: [date, event, description, type]

    PipelineSummary:
      type: object
      properties:
        totalDeals:
          type: integer
        totalValue:
          type: number
        byStage:
          type: array
          items:
            $ref: "#/components/schemas/StageCount"
        avgTimeToClose:
          type: number
        dealsClosedThisYear:
          type: integer
        valueClosedThisYear:
          type: number
      required: [totalDeals, totalValue, byStage, avgTimeToClose, dealsClosedThisYear, valueClosedThisYear]

    StageCount:
      type: object
      properties:
        stage:
          type: string
        count:
          type: integer
        value:
          type: number
      required: [stage, count, value]

    Engagement:
      type: object
      properties:
        id:
          type: string
        clientName:
          type: string
        serviceType:
          type: string
          enum: [fpa, strategic_finance, corp_dev, due_diligence, valuation]
        status:
          type: string
          enum: [active, completed, proposal, on_hold]
        startDate:
          type: string
        endDate:
          type: string
        fee:
          type: number
        progress:
          type: integer
        lead:
          type: string
        description:
          type: string
      required: [id, clientName, serviceType, status, startDate, fee, progress, lead, description]

    ServicesOverview:
      type: object
      properties:
        activeEngagements:
          type: integer
        totalRevenue:
          type: number
        avgEngagementSize:
          type: number
        completedThisYear:
          type: integer
        revenueChange:
          type: number
        engagementsByType:
          type: array
          items:
            $ref: "#/components/schemas/ServiceTypeCount"
      required: [activeEngagements, totalRevenue, avgEngagementSize, completedThisYear, revenueChange, engagementsByType]

    ServiceTypeCount:
      type: object
      properties:
        type:
          type: string
        count:
          type: integer
        revenue:
          type: number
      required: [type, count, revenue]
