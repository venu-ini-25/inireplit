kind = "web"
previewPath = "/"
title = "Finance Tech SaaS Platform"
version = "1.0.0"
id = "artifacts/finance-saas"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19438

[services.development]
run = "pnpm --filter @workspace/finance-saas run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/finance-saas", "run", "build" ]
publicDir = "artifacts/finance-saas/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19438"
BASE_PATH = "/"
