openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: iNi - Invent N Invest Finance Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: portfolio
    description: Portfolio management
  - name: analytics
    description: Reporting and analytics
  - name: deals
    description: M&A deals and pipeline
  - name: services
    description: Professional services engagements
  - name: metrics
    description: Operational module metrics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /portfolio/summary:
    get:
      operationId: getPortfolioSummary
      tags: [portfolio]
      summary: Get portfolio summary metrics
      responses:
        "200":
          description: Portfolio summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioSummary"

  /portfolio/companies:
    get:
      operationId: getPortfolioCompanies
      tags: [portfolio]
      summary: List portfolio companies
      responses:
        "200":
          description: List of portfolio companies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PortfolioCompany"

  /portfolio/companies/{id}:
    get:
      operationId: getPortfolioCompany
      tags: [portfolio]
      summary: Get a portfolio company detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Company detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioCompanyDetail"

  /portfolio/kpis:
    get:
      operationId: getPortfolioKpis
      tags: [portfolio]
      summary: Get KPI dashboard data
      parameters:
        - name: companyId
          in: query
          schema:
            type: string
        - name: period
          in: query
          schema:
            type: string
            enum: [Q1, Q2, Q3, Q4, TTM, YTD]
      responses:
        "200":
          description: KPI data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KpiData"

  /analytics/revenue:
    get:
      operationId: getRevenueAnalytics
      tags: [analytics]
      summary: Get revenue trend data
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [6m, 1y, 2y, 3y]
        - name: companyId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Revenue analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevenueAnalytics"

  /analytics/benchmarks:
    get:
      operationId: getBenchmarks
      tags: [analytics]
      summary: Get industry benchmarks
      parameters:
        - name: industry
          in: query
          schema:
            type: string
        - name: metric
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Benchmark data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BenchmarkData"

  /analytics/reports:
    get:
      operationId: getReports
      tags: [analytics]
      summary: List available reports
      responses:
        "200":
          description: List of reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Report"

  /analytics/spending:
    get:
      operationId: getSpendingAnalytics
      tags: [analytics]
      summary: Get spending breakdown by category
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [7d, 30d, 90d, 1y]
      responses:
        "200":
          description: Spending analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpendingAnalytics"

  /deals:
    get:
      operationId: getDeals
      tags: [deals]
      summary: List M&A deals
      parameters:
        - name: stage
          in: query
          schema:
            type: string
            enum: [sourcing, nda, due_diligence, negotiation, closing, closed, passed]
        - name: type
          in: query
          schema:
            type: string
            enum: [acquisition, merger, investment, divestiture]
      responses:
        "200":
          description: List of deals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Deal"

  /deals/{id}:
    get:
      operationId: getDeal
      tags: [deals]
      summary: Get deal details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deal detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DealDetail"

  /deals/pipeline-summary:
    get:
      operationId: getDealPipelineSummary
      tags: [deals]
      summary: Get M&A pipeline summary
      responses:
        "200":
          description: Pipeline summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineSummary"

  /services/engagements:
    get:
      operationId: getEngagements
      tags: [services]
      summary: List professional service engagements
      responses:
        "200":
          description: List of engagements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Engagement"

  /services/overview:
    get:
      operationId: getServicesOverview
      tags: [services]
      summary: Get professional services overview metrics
      responses:
        "200":
          description: Services overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServicesOverview"

  /metrics/operations:
    get:
      operationId: getOperationsMetrics
      tags: [metrics]
      summary: Get operations module metrics
      responses:
        "200":
          description: Operations metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationsMetrics"

  /metrics/product:
    get:
      operationId: getProductMetrics
      tags: [metrics]
      summary: Get product module metrics
      responses:
        "200":
          description: Product metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductMetrics"

  /metrics/marketing:
    get:
      operationId: getMarketingMetrics
      tags: [metrics]
      summary: Get marketing module metrics
      responses:
        "200":
          description: Marketing metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketingMetrics"

  /metrics/sales:
    get:
      operationId: getSalesMetrics
      tags: [metrics]
      summary: Get sales module metrics
      responses:
        "200":
          description: Sales metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesMetrics"

  /metrics/people:
    get:
      operationId: getPeopleMetrics
      tags: [metrics]
      summary: Get people module metrics
      responses:
        "200":
          description: People metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PeopleMetrics"

  /metrics/cashflow:
    get:
      operationId: getCashFlowMetrics
      tags: [metrics]
      summary: Get cash flow module metrics
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [Monthly, Quarterly, Annual]
      responses:
        "200":
          description: Cash flow metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashFlowMetrics"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    PortfolioSummary:
      type: object
      properties:
        totalCompanies:
          type: integer
        totalAum:
          type: number
        totalRevenue:
          type: number
        avgGrowthRate:
          type: number
        avgValuation:
          type: number
        totalDeals:
          type: integer
        aumChange:
          type: number
        revenueChange:
          type: number
        growthChange:
          type: number
      required: [totalCompanies, totalAum, totalRevenue, avgGrowthRate, avgValuation, totalDeals, aumChange, revenueChange, growthChange]

    PortfolioCompany:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        industry:
          type: string
        stage:
          type: string
          enum: [seed, series_a, series_b, series_c, growth, public]
        revenue:
          type: number
        valuation:
          type: number
        growthRate:
          type: number
        employees:
          type: integer
        location:
          type: string
        status:
          type: string
          enum: [active, monitoring, exited, watchlist]
        dataVerified:
          type: boolean
        ndaSigned:
          type: boolean
        lastUpdated:
          type: string
        logo:
          type: string
      required: [id, name, industry, stage, revenue, valuation, growthRate, employees, location, status, dataVerified, ndaSigned, lastUpdated]

    TrendPoint:
      type: object
      properties:
        q:
          type: string
        v:
          type: number
      required: [q, v]

    PortfolioCompanyDetail:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        industry:
          type: string
        stage:
          type: string
        revenue:
          type: number
        valuation:
          type: number
        growthRate:
          type: number
        employees:
          type: integer
        location:
          type: string
        status:
          type: string
        dataVerified:
          type: boolean
        ndaSigned:
          type: boolean
        lastUpdated:
          type: string
        founded:
          type: integer
        ownership:
          type: string
        arr:
          type: string
        arrGrowthPct:
          type: number
        irr:
          type: string
        moic:
          type: string
        lastValDate:
          type: string
        investors:
          type: array
          items:
            type: string
        capTable:
          type: array
          items:
            $ref: "#/components/schemas/CapTableEntry"
        financials:
          $ref: "#/components/schemas/CompanyFinancials"
        kpis:
          type: array
          items:
            $ref: "#/components/schemas/KpiMetric"
        arrTrend:
          type: array
          items:
            $ref: "#/components/schemas/TrendPoint"
        headcountTrend:
          type: array
          items:
            $ref: "#/components/schemas/TrendPoint"
        burnTrend:
          type: array
          items:
            $ref: "#/components/schemas/TrendPoint"
      required: [id, name, industry, stage, revenue, valuation, growthRate, employees, location, status, dataVerified, ndaSigned, lastUpdated, founded, ownership, arr, arrGrowthPct, irr, moic, lastValDate, investors, capTable, financials, kpis, arrTrend, headcountTrend, burnTrend]

    CapTableEntry:
      type: object
      properties:
        investor:
          type: string
        shares:
          type: integer
        percentage:
          type: number
        shareClass:
          type: string
        investmentAmount:
          type: number
      required: [investor, shares, percentage, shareClass, investmentAmount]

    CompanyFinancials:
      type: object
      properties:
        revenue:
          type: number
        expenses:
          type: number
        ebitda:
          type: number
        cashOnHand:
          type: number
        burnRate:
          type: number
        runway:
          type: integer
      required: [revenue, expenses, ebitda, cashOnHand, burnRate, runway]

    KpiMetric:
      type: object
      properties:
        name:
          type: string
        value:
          type: number
        unit:
          type: string
        change:
          type: number
        trend:
          type: string
          enum: [up, down, flat]
      required: [name, value, unit, change, trend]

    KpiData:
      type: object
      properties:
        metrics:
          type: array
          items:
            $ref: "#/components/schemas/KpiMetric"
        period:
          type: string
        companyName:
          type: string
      required: [metrics, period, companyName]

    RevenueDataPoint:
      type: object
      properties:
        period:
          type: string
        revenue:
          type: number
        expenses:
          type: number
        ebitda:
          type: number
        arr:
          type: number
      required: [period, revenue, expenses, ebitda, arr]

    RevenueAnalytics:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/RevenueDataPoint"
        totalRevenue:
          type: number
        revenueGrowth:
          type: number
        arrGrowth:
          type: number
      required: [data, totalRevenue, revenueGrowth, arrGrowth]

    BenchmarkItem:
      type: object
      properties:
        label:
          type: string
        company:
          type: number
        industry:
          type: number
        topQuartile:
          type: number
        unit:
          type: string
      required: [label, company, industry, topQuartile, unit]

    BenchmarkData:
      type: object
      properties:
        industry:
          type: string
        metrics:
          type: array
          items:
            $ref: "#/components/schemas/BenchmarkItem"
        radarData:
          type: array
          items:
            type: object
            properties:
              subject:
                type: string
              portfolio:
                type: number
              peerMedian:
                type: number
              fullMark:
                type: number
            required: [subject, portfolio, peerMedian, fullMark]
      required: [industry, metrics, radarData]

    Report:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        type:
          type: string
          enum: [investor_update, financial_summary, kpi_report, board_deck, due_diligence, benchmarking]
        status:
          type: string
          enum: [draft, ready, published, archived]
        createdAt:
          type: string
        updatedAt:
          type: string
        sharedWith:
          type: integer
        companyName:
          type: string
      required: [id, title, type, status, createdAt, updatedAt, sharedWith, companyName]

    SpendingCategory:
      type: object
      properties:
        name:
          type: string
        amount:
          type: number
        percentage:
          type: number
        color:
          type: string
        change:
          type: number
      required: [name, amount, percentage, color, change]

    SpendingLineItem:
      type: object
      properties:
        vendor:
          type: string
        category:
          type: string
        dept:
          type: string
        amount:
          type: number
        status:
          type: string
        date:
          type: string
      required: [vendor, category, dept, amount, status, date]

    SpendingDeptBudget:
      type: object
      properties:
        dept:
          type: string
        budget:
          type: number
        actual:
          type: number
      required: [dept, budget, actual]

    SpendingAnalytics:
      type: object
      properties:
        categories:
          type: array
          items:
            $ref: "#/components/schemas/SpendingCategory"
        deptBudgets:
          type: array
          items:
            $ref: "#/components/schemas/SpendingDeptBudget"
        lineItems:
          type: array
          items:
            $ref: "#/components/schemas/SpendingLineItem"
        totalSpending:
          type: number
        averageDaily:
          type: number
        topCategory:
          type: string
      required: [categories, deptBudgets, lineItems, totalSpending, averageDaily, topCategory]

    Deal:
      type: object
      properties:
        id:
          type: string
        companyName:
          type: string
        industry:
          type: string
        dealType:
          type: string
          enum: [acquisition, merger, investment, divestiture]
        stage:
          type: string
          enum: [sourcing, nda, due_diligence, negotiation, closing, closed, passed]
        dealSize:
          type: number
        valuation:
          type: number
        targetRevenue:
          type: number
        assignedTo:
          type: string
        priority:
          type: string
          enum: [high, medium, low]
        createdAt:
          type: string
        updatedAt:
          type: string
        closingDate:
          type: string
        ndaSigned:
          type: boolean
        dataRoomAccess:
          type: boolean
      required: [id, companyName, industry, dealType, stage, dealSize, valuation, targetRevenue, assignedTo, priority, createdAt, updatedAt, ndaSigned, dataRoomAccess]

    DealDetail:
      type: object
      properties:
        id:
          type: string
        companyName:
          type: string
        industry:
          type: string
        dealType:
          type: string
        stage:
          type: string
        dealSize:
          type: number
        valuation:
          type: number
        targetRevenue:
          type: number
        assignedTo:
          type: string
        priority:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
        closingDate:
          type: string
        ndaSigned:
          type: boolean
        dataRoomAccess:
          type: boolean
        dueDiligenceItems:
          type: array
          items:
            $ref: "#/components/schemas/DueDiligenceItem"
        timeline:
          type: array
          items:
            $ref: "#/components/schemas/TimelineEvent"
        overview:
          type: string
        thesis:
          type: string
        financials:
          type: object
          properties:
            arr:
              type: number
            nrr:
              type: number
            growth:
              type: number
            ebitda:
              type: number
          required: [arr, nrr, growth, ebitda]
        synergies:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              value:
                type: string
              confidence:
                type: string
            required: [type, value, confidence]
        contacts:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              role:
                type: string
              email:
                type: string
            required: [name, role]
        documents:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              type:
                type: string
              date:
                type: string
              size:
                type: string
            required: [name, type, date, size]
      required: [id, companyName, industry, dealType, stage, dealSize, valuation, targetRevenue, assignedTo, priority, createdAt, updatedAt, ndaSigned, dataRoomAccess, dueDiligenceItems, timeline, overview, thesis, financials, synergies, contacts, documents]

    DueDiligenceItem:
      type: object
      properties:
        category:
          type: string
        item:
          type: string
        status:
          type: string
          enum: [pending, in_progress, completed, flagged]
        assignedTo:
          type: string
        dueDate:
          type: string
      required: [category, item, status, assignedTo, dueDate]

    TimelineEvent:
      type: object
      properties:
        date:
          type: string
        event:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [milestone, document, meeting, update]
      required: [date, event, description, type]

    PipelineSummary:
      type: object
      properties:
        totalDeals:
          type: integer
        totalValue:
          type: number
        byStage:
          type: array
          items:
            $ref: "#/components/schemas/StageCount"
        avgTimeToClose:
          type: number
        dealsClosedThisYear:
          type: integer
        valueClosedThisYear:
          type: number
      required: [totalDeals, totalValue, byStage, avgTimeToClose, dealsClosedThisYear, valueClosedThisYear]

    StageCount:
      type: object
      properties:
        stage:
          type: string
        count:
          type: integer
        value:
          type: number
      required: [stage, count, value]

    Engagement:
      type: object
      properties:
        id:
          type: string
        clientName:
          type: string
        serviceType:
          type: string
          enum: [fpa, strategic_finance, corp_dev, due_diligence, valuation]
        status:
          type: string
          enum: [active, completed, proposal, on_hold]
        startDate:
          type: string
        endDate:
          type: string
        fee:
          type: number
        progress:
          type: integer
        lead:
          type: string
        description:
          type: string
      required: [id, clientName, serviceType, status, startDate, fee, progress, lead, description]

    ServicesOverview:
      type: object
      properties:
        activeEngagements:
          type: integer
        totalRevenue:
          type: number
        avgEngagementSize:
          type: number
        completedThisYear:
          type: integer
        revenueChange:
          type: number
        engagementsByType:
          type: array
          items:
            $ref: "#/components/schemas/ServiceTypeCount"
        revenueMonthly:
          type: array
          items:
            type: object
            properties:
              month:
                type: string
              rev:
                type: number
            required: [month, rev]
      required: [activeEngagements, totalRevenue, avgEngagementSize, completedThisYear, revenueChange, engagementsByType, revenueMonthly]

    ServiceTypeCount:
      type: object
      properties:
        type:
          type: string
        count:
          type: integer
        revenue:
          type: number
      required: [type, count, revenue]

    HeadcountPoint:
      type: object
      properties:
        month:
          type: string
        hc:
          type: integer
      required: [month, hc]

    BurnRunwayPoint:
      type: object
      properties:
        month:
          type: string
        burn:
          type: number
        runway:
          type: integer
      required: [month, burn, runway]

    UnitEconomicRow:
      type: object
      properties:
        metric:
          type: string
        value:
          type: string
        prev:
          type: string
        delta:
          type: number
        good:
          type: boolean
      required: [metric, value, prev, delta, good]

    OperationsMetrics:
      type: object
      properties:
        totalHeadcount:
          type: integer
        monthlyBurnM:
          type: number
        cashRunwayMonths:
          type: integer
        grossMarginPct:
          type: number
        headcountTrend:
          type: array
          items:
            $ref: "#/components/schemas/HeadcountPoint"
        burnRunway:
          type: array
          items:
            $ref: "#/components/schemas/BurnRunwayPoint"
        unitEconomics:
          type: array
          items:
            $ref: "#/components/schemas/UnitEconomicRow"
      required: [totalHeadcount, monthlyBurnM, cashRunwayMonths, grossMarginPct, headcountTrend, burnRunway, unitEconomics]

    EngagementTrendPoint:
      type: object
      properties:
        month:
          type: string
        dau:
          type: integer
        mau:
          type: integer
      required: [month, dau, mau]

    FeatureAdoptionRow:
      type: object
      properties:
        feature:
          type: string
        adoption:
          type: number
      required: [feature, adoption]

    WaterfallBar:
      type: object
      properties:
        name:
          type: string
        value:
          type: number
        type:
          type: string
      required: [name, value, type]

    ProductMetrics:
      type: object
      properties:
        dauCount:
          type: integer
        mauCount:
          type: integer
        dauMauRatio:
          type: number
        churnRatePct:
          type: number
        engagementTrend:
          type: array
          items:
            $ref: "#/components/schemas/EngagementTrendPoint"
        featureAdoption:
          type: array
          items:
            $ref: "#/components/schemas/FeatureAdoptionRow"
        churnWaterfall:
          type: array
          items:
            $ref: "#/components/schemas/WaterfallBar"
      required: [dauCount, mauCount, dauMauRatio, churnRatePct, engagementTrend, featureAdoption, churnWaterfall]

    ChannelCac:
      type: object
      properties:
        channel:
          type: string
        cac:
          type: number
        leads:
          type: integer
        color:
          type: string
      required: [channel, cac, leads, color]

    LeadFunnelStage:
      type: object
      properties:
        stage:
          type: string
        value:
          type: integer
      required: [stage, value]

    CampaignRow:
      type: object
      properties:
        name:
          type: string
        channel:
          type: string
        spend:
          type: number
        leads:
          type: integer
        pipeline:
          type: number
        roi:
          type: string
      required: [name, channel, spend, leads, pipeline, roi]

    AttributionSlice:
      type: object
      properties:
        name:
          type: string
        value:
          type: number
        color:
          type: string
      required: [name, value, color]

    MarketingMetrics:
      type: object
      properties:
